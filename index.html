<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prosto_lublu_spat · Био</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0b0b1a;
      user-select: none;
      touch-action: none;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    /* --- ФОНОВОЕ ВИДЕО --- */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.3;
      pointer-events: none;
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(11,11,26,0.3) 0%, rgba(11,11,26,0.7) 100%);
      z-index: 1;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }
    .content * { pointer-events: auto; }
    
    .glass-card {
      background: rgba(10, 8, 25, 0.5);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 48px;
      padding: 2.8rem 4rem;
      border: 1px solid rgba(255, 180, 255, 0.2);
      box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,100,200,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
      max-width: 700px;
      margin: 1.5rem;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(180,120,255,0.05), transparent, rgba(255,120,200,0.05), transparent);
      animation: rotateGlow 20s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .glass-card > * { position: relative; z-index: 2; }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #b47aff, #6d28d9);
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 0 40px rgba(100, 50, 255, 0.3);
      border: 2px solid rgba(255,255,255,0.1);
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 0 0.3rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ff9eff, #b7a6ff, #7ec8ff, #ff9eff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShiftTitle 4s ease-in-out infinite;
    }
    @keyframes gradientShiftTitle {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .username {
      font-size: 1rem;
      color: #8888bb;
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      font-weight: 400;
    }
    .username span {
      color: #b7a6ff;
    }
    
    .description {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #d6d0f0;
      margin-bottom: 1.8rem;
      background: rgba(0,0,0,0.25);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(4px);
      max-width: 500px;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      box-shadow: 0 12px 28px -8px rgba(100, 50, 255, 0.5);
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 20px 40px -6px #7c3aed;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
    }
    .btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .btn:hover::after { opacity: 1; }
    
    .social-links {
      display: flex;
      gap: 1rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .social-links a {
      color: #8888bb;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.3s;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .social-links a:hover {
      color: white;
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.3);
    }
    
    /* --- СПОТИФАЙ КНОПКА --- */
    .spotify-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      cursor: pointer;
      background: linear-gradient(135deg, #1DB954, #1ed760);
      box-shadow: 0 8px 20px -6px rgba(29, 185, 84, 0.3);
      margin-top: 0.8rem;
    }
    .spotify-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 16px 32px -8px rgba(29, 185, 84, 0.5);
      background: linear-gradient(135deg, #1ed760, #1DB954);
    }
    .spotify-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    /* --- ТЕМЫ --- */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(10,8,25,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 60px;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .theme-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active {
      border-color: white;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    .theme-dot::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .glass-card { 
        padding: 1.8rem 1.2rem; 
        border-radius: 32px;
        margin: 1rem;
        max-width: 95%;
      }
      .description { 
        font-size: 0.95rem; 
        padding: 0.6rem 1.2rem;
        max-width: 100%;
      }
      .btn { 
        padding: 0.7rem 1.8rem; 
        font-size: 0.95rem; 
        width: 100%;
        justify-content: center;
      }
      .theme-toggle { 
        top: 12px; 
        right: 12px; 
        padding: 6px 10px; 
        gap: 5px;
      }
      .theme-dot { 
        width: 22px; 
        height: 22px; 
      }
      .avatar {
        width: 80px;
        height: 80px;
        font-size: 2.4rem;
      }
      .spotify-btn {
        padding: 0.6rem 1.4rem;
        font-size: 0.8rem;
        width: 100%;
        justify-content: center;
      }
      .spotify-btn svg {
        width: 18px;
        height: 18px;
      }
    }
    
    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .glass-card { padding: 1.2rem 0.8rem; }
      .description { font-size: 0.85rem; padding: 0.5rem 0.8rem; }
      .btn { font-size: 0.85rem; padding: 0.6rem 1.2rem; }
      .theme-dot { width: 18px; height: 18px; }
      .avatar {
        width: 65px;
        height: 65px;
        font-size: 2rem;
      }
      .username { font-size: 0.85rem; }
      .spotify-btn {
        font-size: 0.75rem;
        padding: 0.5rem 1rem;
      }
      .spotify-btn svg {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>

<script type="module">
import * as THREE from 'three';

// --- THREE.JS СЦЕНА ---
console.log('🎮 Запуск 3D сцены...');

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b1a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// --- ОСВЕЩЕНИЕ ---
const ambient = new THREE.AmbientLight(0x40406b, 0.5);
scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xffbbff, 1.5);
mainLight.position.set(2, 4, 5);
mainLight.castShadow = true;
scene.add(mainLight);

const backLight = new THREE.DirectionalLight(0x88aaff, 1);
backLight.position.set(-3, -1, -5);
scene.add(backLight);

const fillLight = new THREE.PointLight(0xaa88ff, 0.8, 15);
fillLight.position.set(1, 2, 5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff66aa, 0.6);
rimLight.position.set(-2, 1, -4);
scene.add(rimLight);

// --- ЗВЁЗДНЫЙ ДОЖДЬ ---
const starCount = 350;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starSpeeds = new Float32Array(starCount);
const starSizes = new Float32Array(starCount);

for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random() - 0.5) * 35;
  starPos[i*3+1] = (Math.random() - 0.5) * 25 + 5;
  starPos[i*3+2] = (Math.random() - 0.5) * 35 - 10;
  starSpeeds[i] = 0.015 + Math.random() * 0.05;
  starSizes[i] = 0.04 + Math.random() * 0.12;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

const starMat = new THREE.PointsMaterial({
  color: 0x99bbff,
  size: 0.07,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Хвосты звёзд
const trailCount = 60;
const trailGroup = new THREE.Group();
for (let i = 0; i < trailCount; i++) {
  const length = 0.5 + Math.random() * 1.5;
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array([
    0, 0, 0,
    0, -length, 0
  ]);
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.7, 0.5),
    transparent: true,
    opacity: 0.2 + Math.random() * 0.3,
  });
  const line = new THREE.Line(geo, mat);
  line.position.set(
    (Math.random() - 0.5) * 35,
    (Math.random() - 0.5) * 25 + 5,
    (Math.random() - 0.5) * 35 - 10
  );
  line.rotation.z = Math.random() * Math.PI * 2;
  line.userData = {
    speed: 0.008 + Math.random() * 0.04,
    rotSpeed: (Math.random() - 0.5) * 0.01
  };
  trailGroup.add(line);
}
scene.add(trailGroup);

// --- ТУМАННОСТЬ ---
scene.fog = new THREE.FogExp2(0x0b0b1a, 0.025);

const cloudGroup = new THREE.Group();
const cloudMat = new THREE.MeshPhysicalMaterial({
  color: 0x6644cc,
  emissive: 0x331166,
  transparent: true,
  opacity: 0.06,
  roughness: 0.6,
  metalness: 0.0,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
});

for (let i = 0; i < 20; i++) {
  const size = 1.5 + Math.random() * 3.5;
  const cloud = new THREE.Mesh(
    new THREE.SphereGeometry(size, 10, 10),
    cloudMat
  );
  cloud.position.set(
    (Math.random() - 0.5) * 25,
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 25 - 8
  );
  cloud.scale.set(
    1 + Math.random() * 0.5,
    0.2 + Math.random() * 0.3,
    1 + Math.random() * 0.5
  );
  cloud.userData = {
    speed: 0.0005 + Math.random() * 0.002,
    phase: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.005
  };
  cloudGroup.add(cloud);
}
scene.add(cloudGroup);

// Туманные частицы
const mistCount = 500;
const mistGeo = new THREE.BufferGeometry();
const mistPos = new Float32Array(mistCount * 3);
for (let i = 0; i < mistCount; i++) {
  mistPos[i*3] = (Math.random() - 0.5) * 35;
  mistPos[i*3+1] = (Math.random() - 0.5) * 18;
  mistPos[i*3+2] = (Math.random() - 0.5) * 35 - 5;
}
mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos, 3));
const mistMat = new THREE.PointsMaterial({
  color: 0x8866ff,
  size: 0.4,
  transparent: true,
  opacity: 0.03,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const mist = new THREE.Points(mistGeo, mistMat);
scene.add(mist);

// --- 3D ОБЪЕКТЫ ---
const torusGeo = new THREE.TorusGeometry(2.0, 0.3, 48, 72);
const torusMat = new THREE.MeshPhysicalMaterial({
  color: 0xb47aff,
  emissive: 0x3d1f6e,
  roughness: 0.2,
  metalness: 0.7,
  clearcoat: 0.3,
  clearcoatRoughness: 0.2,
  transparent: true,
  opacity: 0.9,
});
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.rotation.x = Math.PI / 2.5;
torus.rotation.y = 0.3;
torus.castShadow = true;
scene.add(torus);

const innerRingGeo = new THREE.TorusGeometry(1.5, 0.1, 24, 48);
const innerRingMat = new THREE.MeshPhysicalMaterial({
  color: 0xff88dd,
  emissive: 0x7a2a7a,
  roughness: 0.2,
  metalness: 0.3,
  transparent: true,
  opacity: 0.7,
});
const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
innerRing.rotation.x = Math.PI / 2.2;
innerRing.rotation.y = -0.4;
scene.add(innerRing);

const crystalGeo = new THREE.IcosahedronGeometry(0.5, 1);
const crystalMat = new THREE.MeshPhysicalMaterial({
  color: 0xff88cc,
  emissive: 0x551144,
  roughness: 0.1,
  metalness: 0.1,
  transparent: true,
  opacity: 0.6,
});
const crystal = new THREE.Mesh(crystalGeo, crystalMat);
crystal.position.set(0, 0.1, 0);
scene.add(crystal);

const wireCrystal = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.65, 1),
  new THREE.MeshBasicMaterial({ color: 0xaa88ff, wireframe: true, transparent: true, opacity: 0.2 })
);
wireCrystal.position.set(0, 0.1, 0);
scene.add(wireCrystal);

// Крылья
const wingGroup = new THREE.Group();
const wingMat = new THREE.MeshPhysicalMaterial({
  color: 0xaa88ff,
  emissive: 0x3f1f6f,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide,
  roughness: 0.3,
  metalness: 0.1,
});
for (let i = 0; i < 6; i++) {
  const wingGeo = new THREE.ConeGeometry(0.4 + Math.random() * 0.3, 1.5 + Math.random() * 0.4, 5);
  const wing = new THREE.Mesh(wingGeo, wingMat);
  const angle = (i / 6) * Math.PI * 2;
  const radius = 2.6 + Math.random() * 0.4;
  wing.position.set(Math.sin(angle) * radius, Math.cos(angle) * radius * 0.7, Math.sin(angle * 1.3) * 0.6);
  wing.rotation.z = angle + 0.2;
  wing.rotation.x = 0.6 + Math.random() * 0.3;
  wing.scale.set(1, 1, 0.3 + Math.random() * 0.3);
  wingGroup.add(wing);
}
scene.add(wingGroup);

// Частицы
const particlesCount = 1500;
const posArray = new Float32Array(particlesCount * 3);
const colorArray = new Float32Array(particlesCount * 3);
const sizes = new Float32Array(particlesCount);

for (let i = 0; i < particlesCount; i++) {
  const radius = 2.5 + Math.random() * 6;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos((Math.random() * 2) - 1);
  posArray[i*3] = Math.sin(phi) * Math.cos(theta) * radius;
  posArray[i*3+1] = Math.sin(phi) * Math.sin(theta) * radius * 0.6;
  posArray[i*3+2] = Math.cos(phi) * radius * 1.1;
  
  const col = new THREE.Color().setHSL(0.75 + Math.random() * 0.2, 0.7, 0.5 + Math.random() * 0.3);
  colorArray[i*3] = col.r;
  colorArray[i*3+1] = col.g;
  colorArray[i*3+2] = col.b;
  sizes[i] = 0.03 + Math.random() * 0.1;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.07,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Пузырьки
const bubbleGroup = new THREE.Group();
const bubbleMat = new THREE.MeshPhysicalMaterial({
  color: 0x99aaff,
  emissive: 0x334488,
  roughness: 0.1,
  metalness: 0.1,
  transparent: true,
  opacity: 0.15,
  clearcoat: 0.5,
});
for (let i = 0; i < 35; i++) {
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.05 + Math.random()*0.08, 8), bubbleMat);
  const r = 2.8 + Math.random() * 3;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos((Math.random() * 2) - 1);
  sphere.position.set(
    Math.sin(phi) * Math.cos(theta) * r,
    Math.sin(phi) * Math.sin(theta) * r * 0.6,
    Math.cos(phi) * r * 0.9
  );
  sphere.userData = { speed: 0.001 + Math.random() * 0.003, phase: Math.random() * Math.PI * 2 };
  bubbleGroup.add(sphere);
}
scene.add(bubbleGroup);

// --- ИНТЕРАКТИВНОСТЬ ---
let mouseX = 0, mouseY = 0;
let targetRotX = 0, targetRotY = 0;
let isMobile = window.innerWidth < 768;

document.addEventListener('touchmove', (event) => {
  if (event.touches.length > 0) {
    const touch = event.touches[0];
    mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
    targetRotY = mouseX * 0.3;
    targetRotX = mouseY * 0.15;
  }
}, { passive: true });

document.addEventListener('mousemove', (event) => {
  if (isMobile) return;
  mouseX = (event.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
  targetRotY = mouseX * 0.3;
  targetRotX = mouseY * 0.15;
});

// --- ТЕМЫ ---
const themes = {
  default: {
    bg: 0x0b0b1a,
    main: 0xb47aff,
    emissive: 0x3d1f6e,
    inner: 0xff88dd,
    particleHue: 0.75,
    ambient: 0x40406b,
    fog: 0x0b0b1a,
  },
  sunset: {
    bg: 0x1a0b12,
    main: 0xff7eb3,
    emissive: 0x7a1f3e,
    inner: 0xffbb88,
    particleHue: 0.05,
    ambient: 0x6b4040,
    fog: 0x1a0b12,
  },
  ocean: {
    bg: 0x0b1a2e,
    main: 0x4facfe,
    emissive: 0x1f3f6e,
    inner: 0x88ddff,
    particleHue: 0.55,
    ambient: 0x40406b,
    fog: 0x0b1a2e,
  },
  neon: {
    bg: 0x0a0a0a,
    main: 0x00ff87,
    emissive: 0x003f2a,
    inner: 0x60efff,
    particleHue: 0.45,
    ambient: 0x1a2a1a,
    fog: 0x0a0a0a,
  },
  dark: {
    bg: 0x050508,
    main: 0x6d28d9,
    emissive: 0x1a0a3a,
    inner: 0x8b5cf6,
    particleHue: 0.8,
    ambient: 0x1a1a2e,
    fog: 0x050508,
  }
};

let currentTheme = 'default';

function applyTheme(themeName) {
  const theme = themes[themeName];
  if (!theme) return;
  currentTheme = themeName;
  
  scene.background = new THREE.Color(theme.bg);
  scene.fog.color = new THREE.Color(theme.fog);
  ambient.color = new THREE.Color(theme.ambient);
  
  torusMat.color = new THREE.Color(theme.main);
  torusMat.emissive = new THREE.Color(theme.emissive);
  
  innerRingMat.color = new THREE.Color(theme.inner);
  innerRingMat.emissive = new THREE.Color(theme.emissive);
  
  const colors = particles.geometry.attributes.color.array;
  for (let i = 0; i < colors.length; i += 3) {
    const col = new THREE.Color().setHSL(
      theme.particleHue + (Math.random() - 0.5) * 0.2,
      0.7 + Math.random() * 0.3,
      0.5 + Math.random() * 0.3
    );
    colors[i] = col.r;
    colors[i+1] = col.g;
    colors[i+2] = col.b;
  }
  particles.geometry.attributes.color.needsUpdate = true;
  
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.classList.toggle('active', dot.dataset.theme === themeName);
  });
}

document.querySelectorAll('.theme-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    applyTheme(dot.dataset.theme);
  });
});

// --- АНИМАЦИЯ ---
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.005;

  const positions = stars.geometry.attributes.position.array;
  for (let i = 0; i < starCount; i++) {
    positions[i*3+1] -= starSpeeds[i];
    if (positions[i*3+1] < -10) {
      positions[i*3] = (Math.random() - 0.5) * 35;
      positions[i*3+1] = 12 + Math.random() * 5;
      positions[i*3+2] = (Math.random() - 0.5) * 35 - 10;
    }
  }
  stars.geometry.attributes.position.needsUpdate = true;
  
  trailGroup.children.forEach(line => {
    line.position.y -= line.userData.speed;
    line.rotation.z += line.userData.rotSpeed;
    if (line.position.y < -10) {
      line.position.set(
        (Math.random() - 0.5) * 35,
        12 + Math.random() * 5,
        (Math.random() - 0.5) * 35 - 10
      );
    }
  });
  
  cloudGroup.children.forEach(cloud => {
    cloud.position.x += Math.sin(time * cloud.userData.speed + cloud.userData.phase) * 0.003;
    cloud.position.y += Math.cos(time * cloud.userData.speed * 0.7 + cloud.userData.phase) * 0.002;
    cloud.rotation.y += cloud.userData.rotSpeed || 0.001;
  });
  
  mist.rotation.y += 0.0003;

  torus.rotation.y += (targetRotY - torus.rotation.y) * 0.03;
  torus.rotation.x += (targetRotX + Math.PI/2.5 - torus.rotation.x) * 0.02;
  
  innerRing.rotation.y -= 0.006;
  innerRing.rotation.x = Math.PI/2.2 + Math.sin(time * 0.4 + 1) * 0.1;
  
  crystal.rotation.x += 0.003;
  crystal.rotation.y += 0.005;
  wireCrystal.rotation.x = crystal.rotation.x;
  wireCrystal.rotation.y = crystal.rotation.y;
  
  wingGroup.rotation.y += 0.002;
  wingGroup.rotation.x = Math.sin(time * 0.15) * 0.08 + targetRotX * 0.1;
  
  particles.rotation.y += 0.0005;
  particles.rotation.x = Math.sin(time * 0.1) * 0.02;
  
  bubbleGroup.children.forEach((bubble) => {
    const speed = bubble.userData.speed || 0.002;
    const phase = bubble.userData.phase || 0;
    bubble.position.y += Math.sin(time * 2 + phase) * 0.0008;
    bubble.scale.setScalar(1 + Math.sin(time * 1.5 + phase) * 0.2);
  });
  bubbleGroup.rotation.y += 0.0008;
  
  camera.position.x = Math.sin(time * 0.06) * 1.0 + targetRotY * 0.5;
  camera.position.y = Math.cos(time * 0.04) * 0.4 + 0.8 + targetRotX * 0.3;
  camera.lookAt(0, 0.2, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  isMobile = window.innerWidth < 768;
});

console.log('🌸 Prosto_lublu_spat · Добрый и дружелюбный · Spotify');
</script>
</body>
</html>
